name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch:
          - x86
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workloads
        run: dotnet workload install maui --skip-sign-check

      - name: Publish self-contained Windows app
        shell: pwsh
        run: |
          dotnet publish StormPDF.csproj `
            -c Release `
            -f net10.0-windows10.0.19041.0 `
            -r win-${{ matrix.arch }} `
            --self-contained true `
            -p:TargetFrameworks=net10.0-windows10.0.19041.0 `
            -p:WindowsPackageType=None `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o artifacts/publish/win-${{ matrix.arch }}

      - name: Archive Windows publish output
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $source = "artifacts/publish/win-${{ matrix.arch }}/*"
          $zip = "artifacts/stormpdf-$tag-win-${{ matrix.arch }}.zip"
          Compress-Archive -Path $source -DestinationPath $zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: stormpdf-win-${{ matrix.arch }}
          path: artifacts/stormpdf-*.zip

  release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" \
            --title "StormPDF $TAG" \
            --notes "Self-contained builds for Windows x86 and Windows x64. macOS package uploaded from local build." \
            release-assets/stormpdf-win-x86/*.zip \
            release-assets/stormpdf-win-x64/*.zip
